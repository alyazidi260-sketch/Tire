<html dir="rtl" lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>محرك بحث الكفرات - شامل الضريبة</title>
    <style>
        body {
            font-family: 'Tahoma', Arial, sans-serif;
            background: #f0f4f8;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }
        .container {
            background: white;
            padding: 25px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 550px;
            text-align: center;
        }
        h1 {
            color: #1a3a5c;
            font-size: 24px;
            margin-bottom: 5px;
        }
        .sub {
            color: #6b7a8a;
            font-size: 14px;
            margin-top: -5px;
            margin-bottom: 20px;
        }
        input {
            width: 100%;
            padding: 15px;
            font-size: 18px;
            border: 2px solid #d1d9e6;
            border-radius: 12px;
            box-sizing: border-box;
            outline: none;
            transition: 0.3s;
            text-align: center;
            direction: ltr;
        }
        input:focus {
            border-color: #0077be;
            box-shadow: 0 0 0 3px rgba(0,119,190,0.2);
        }
        #resultsContainer {
            margin-top: 20px;
            text-align: right;
            display: none;
        }
        #resultsContainer.show {
            display: block;
        }
        .result-item {
            background: #f8f9fa;
            border-radius: 12px;
            padding: 15px 18px;
            margin-bottom: 10px;
            border-right: 5px solid #0077be;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
        }
        .result-item .size {
            font-weight: bold;
            font-size: 16px;
            color: #1a3a5c;
            flex: 2;
            min-width: 120px;
        }
        .result-item .brand {
            font-size: 15px;
            color: #2c3e50;
            flex: 1;
            text-align: center;
            min-width: 80px;
        }
        .result-item .price-box {
            flex: 1;
            text-align: left;
            min-width: 130px;
            line-height: 1.7;
        }
        .price-base {
            font-size: 15px;
            color: #6b7a8a;
            text-decoration: line-through;
        }
        .price-vat {
            font-size: 22px;
            font-weight: bold;
            color: #e67e22;
        }
        .badge {
            display: inline-block;
            padding: 2px 10px;
            border-radius: 12px;
            font-size: 13px;
            color: white;
            margin-right: 5px;
        }
        .not-found {
            color: #d32f2f;
            font-size: 18px;
            margin-top: 15px;
            display: none;
        }
        .matches-info {
            color: #6b7a8a;
            font-size: 14px;
            margin-bottom: 15px;
            background: #eef6ff;
            padding: 8px;
            border-radius: 8px;
        }
        .hint {
            color: #6b7a8a;
            font-size: 14px;
            margin-top: 15px;
            background: #f8f9fa;
            padding: 10px;
            border-radius: 8px;
        }
        .highlight { color: #e67e22; font-weight: bold; }
        .brand-hanmks { background: #d32f2f; }
        .brand-wanda { background: #f9a825; color: #000; }
        .brand-saif { background: #388e3c; }
        .brand-arkron { background: #2e7d32; }
        .brand-redanz { background: #f57c00; }
        .brand-santara { background: #1565c0; }
        .brand-default { background: #607d8b; }
    </style>
</head>
<body>

    <p class="sub">اكتب الأرقام فقط (مثل: <span class="highlight">1956515</span>)</p>

    <div id="resultsContainer">
        <div class="matches-info" id="matchesInfo"></div>
        <div id="resultsList"></div>
    </div>

    <div id="notFound" class="not-found">✖ لا يوجد مقاس مطابق</div>
    <div class="hint">💡 السعر <b>الأساسي</b> (مشطوب) ← السعر <b>شامل 15%</b> باللون البرتقالي</div>

        ["275/50R22", 300, "سنتارا"]

    // ===== باقي الكود (بدون تغيير) =====
    const input = document.getElementById('searchInput');
    const resultsContainer = document.getElementById('resultsContainer');
    const resultsList = document.getElementById('resultsList');
    const matchesInfo = document.getElementById('matchesInfo');
    const notFoundDiv = document.getElementById('notFound');

    function getNumbers(str) {
        return str.replace(/[^0-9]/g, '');
    }

    function getBrandClass(brand) {
        if (brand.includes('هانمكس')) return 'brand-hanmks';
        if (brand.includes('واندا')) return 'brand-wanda';
        if (brand.includes('سيف ريتش')) return 'brand-saif';
        if (brand.includes('أركـرون')) return 'brand-arkron';
        if (brand.includes('ريدانز')) return 'brand-redanz';
        if (brand.includes('سنتارا')) return 'brand-santara';
        return 'brand-default';
    }

    function displayResults(matches, query) {
        if (matches.length === 0) {
            resultsContainer.classList.remove('show');
            notFoundDiv.style.display = 'block';
            notFoundDiv.textContent = '✖ لا يوجد مقاس يحتوي على: ' + query;
            return;
        }

        notFoundDiv.style.display = 'none';
        resultsContainer.classList.add('show');

        if (matches.length === 1) {
            matchesInfo.textContent = '✅ تم العثور على نتيجة واحدة';
        } else {
            matchesInfo.textContent = '🔄 تم العثور على ' + matches.length + ' نتيجة للمقاسات المتشابهة:';
        }

        let html = '';
        matches.forEach((item, index) => {
            const brandClass = getBrandClass(item[2]);
            const basePrice = item[1];
            const vatPrice = Math.round(basePrice * 1.15);

            html += `
                <div class="result-item">
                    <span class="size">${index+1}. ${item[0]}</span>
                    <span class="brand"><span class="badge ${brandClass}">${item[2]}</span></span>
                    <span class="price-box">
                        <div class="price-base">💰 ${basePrice} ريال (قبل الضريبة)</div>
                        <div class="price-vat">🛒 شامل 15%: ${vatPrice} ريال</div>
                    </span>
                </div>
            `;
        });
        resultsList.innerHTML = html;
    }

    function searchTire() {
        const query = input.value.trim();
        if (!query) {
            resultsContainer.classList.remove('show');
            notFoundDiv.style.display = 'none';
            return;
        }

        let exactMatches = data.filter(item => item[0] === query);
        if (exactMatches.length > 0) {
            displayResults(exactMatches, query);
            return;
        }

        const queryDigits = getNumbers(query);
        if (queryDigits.length === 0) {
            resultsContainer.classList.remove('show');
            notFoundDiv.style.display = 'block';
            notFoundDiv.textContent = '✖ الرجاء كتابة أرقام فقط';
            return;
        }

        let partialMatches = data.filter(item => {
            const itemDigits = getNumbers(item[0]);
            return itemDigits.includes(queryDigits);
        });

        partialMatches.sort((a, b) => a[0].localeCompare(b[0]));

        if (partialMatches.length > 0) {
            displayResults(partialMatches, queryDigits);
        } else {
            resultsContainer.classList.remove('show');
            notFoundDiv.style.display = 'block';
            notFoundDiv.textContent = '✖ لا يوجد مقاس يحتوي على الأرقام: ' + queryDigits;
        }
    }

    input.addEventListener('input', searchTire);
    input.addEventListener('keyup', function(e) {
        if (e.key === 'Enter') searchTire();
    });

    input.focus();
</script>

</html>
